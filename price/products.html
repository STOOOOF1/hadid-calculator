<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة المنتجات ومتوسط الأسعار</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:#f4f7fc;
  color:#242b38;
  padding:16px;
  line-height:1.6;
}
.container{max-width:1200px;margin:0 auto}
.header{
  background:linear-gradient(135deg,#1e3a5f,#15294a);
  color:#fff;
  padding:24px 28px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
}
.header h1{font-size:1.5rem;margin-bottom:4px}
.header p{font-size:.85rem;color:rgba(255,255,255,.65)}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.stat-card{
  background:#fff;
  border-radius:10px;
  padding:16px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  border:1px solid #eef1f5;
}
.stat-card .num{font-size:1.4rem;font-weight:700;color:#1e3a5f}
.stat-card .label{font-size:.75rem;color:#8b97a8;margin-top:2px}
.search-wrap{
  margin-bottom:16px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.search-wrap input{
  flex:1;
  min-width:180px;
  padding:10px 16px;
  border:1.5px solid #d9dfe8;
  border-radius:8px;
  font-size:.88rem;
  font-family:inherit;
  background:#fff;
}
.search-wrap input:focus{outline:none;border-color:#2d5a8e;box-shadow:0 0 0 3px rgba(45,90,142,.1)}
.search-wrap select{
  padding:10px 14px;
  border:1.5px solid #d9dfe8;
  border-radius:8px;
  font-size:.85rem;
  font-family:inherit;
  background:#fff;
}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
}
.product-card{
  background:#fff;
  border-radius:10px;
  padding:18px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  border:1px solid #eef1f5;
  transition:box-shadow .2s,transform .15s;
}
.product-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.06);transform:translateY(-2px)}
.product-name{font-size:.95rem;font-weight:700;color:#1e3a5f;margin-bottom:4px}
.product-desc{font-size:.78rem;color:#6b7a8d;direction:ltr;text-align:left;margin-bottom:6px}
.product-unit{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:#eef4fb;
  color:#1e3a5f;
  padding:2px 10px;
  border-radius:999px;
  font-size:.72rem;
  font-weight:600;
  margin-bottom:10px;
}
.product-details{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.product-avg{font-size:1.1rem;font-weight:800;color:#1e3a5f}
.product-count{font-size:.72rem;color:#8b97a8}
.product-count strong{color:#4f5b6c}
.price-range{font-size:.72rem;color:#8b97a8}
.note-wrap{margin-top:10px;padding-top:10px;border-top:1px dashed #d9dfe8}
.note-wrap label{display:block;font-size:.7rem;color:#8b97a8;margin-bottom:4px;font-weight:600}
.note-wrap input{
  width:100%;
  padding:7px 10px;
  border:1.5px solid #d9dfe8;
  border-radius:6px;
  font-size:.78rem;
  font-family:inherit;
  background:#fafbfc;
  transition:border-color .2s;
}
.note-wrap input:focus{outline:none;border-color:#2d5a8e;background:#fff;box-shadow:0 0 0 3px rgba(45,90,142,.08)}
.note-wrap input.saved{border-color:#0f7b4a;background:#ecfdf3}
.empty-state{text-align:center;padding:60px 20px;color:#8b97a8;font-size:.9rem}
.footer{text-align:center;padding:24px 0;font-size:.75rem;color:#8b97a8}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:10px 24px;border-radius:8px;font-size:.8rem;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:999;
  background:#0f7b4a;color:#fff;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>قائمة المنتجات ومتوسط الأسعار</h1>
  <p>جميع الأسعار بالريال السعودي - شركة النفيعي للحديد</p>
</div>

<div class="stats" id="stats"></div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="بحث عن منتج..." oninput="filterProducts()">
  <select id="unitFilter" onchange="filterProducts()">
    <option value="">جميع الوحدات</option>
    <option value="قطعة">قطعة</option>
    <option value="كغم">كغم</option>
    <option value="م²">م²</option>
    <option value="متر">متر</option>
  </select>
</div>

<div class="product-grid" id="productGrid"></div>

<div class="empty-state" id="emptyState" style="display:none">لا توجد نتائج لبحثك</div>

<div class="footer">تم إعداد قائمة المنتجات والأسعار من بيانات التطبيق وفواتير شركة النفيعي للحديد</div>
</div>

<div class="toast" id="toast"></div>

<!-- ===== Firebase SDK (Realtime Database) ===== -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE CONFIG =====
// استبدل هذا الكائن بإعدادات مشروع Firebase الخاص بك
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const notesRef = db.ref('productNotes');

// ===== PRODUCTS DATA =====
const products = [
  ["HEB عارضة 140×6000","HEB-S275JR Beams","قطعة",666,"657 - 685","6"],
  ["IPE عارضة 400×12000","IPE-S275JR Beams","قطعة",2550,"2,550","1"],
  ["IPEAA عارضة 200×12000","IPEAA-Beams","قطعة",660,"660","1"],
  ["IPEAA وطني عارضة 100×6000","IPEAA-WATANI Beams","قطعة",115,"115","2"],
  ["Round Bar 12مم × 6000","Round Bar A36","قطعة",20,"20","1"],
  ["Round Bar 18مم × 6000 S275JR","Hot Rolled CS Round Bars S275JR","قطعة",71.65,"72","1"],
  ["أنبوب مربع 100×100×6000","Square Tube A36","قطعة",634,"634","3"],
  ["أنبوب مربع 30×30×6000 (2مم)","Square Tube A36","قطعة",37,"36 - 38","6"],
  ["أنبوب مربع 40×40×6000 (2مم)","Square Tube A36","قطعة",48.5,"48 - 50","3"],
  ["أنبوب مربع 40×40×6000 (3مم)","Square Tube A36","قطعة",72.5,"72 - 73","4"],
  ["أنبوب مربع 40×40×6000 (4مم)","Square Tube A36","قطعة",102,"102","3"],
  ["أنبوب مربع 80×80×6000 (6مم)","Square Tube A36","قطعة",335.71,"330 - 340","7"],
  ["أنبوب مستطيل 100×50×6000 (2مم)","Rectangular Tube A36","قطعة",94.64,"94 - 95","3"],
  ["أنبوب مستطيل 100×50×6000 (4مم)","Rectangular Tube A36","قطعة",180,"180","7"],
  ["أنبوب مستطيل 40×20×6000","Rectangular Tube A36","قطعة",38,"38","1"],
  ["أنبوب مستطيل 80×40×6000","Rectangular Tube A36","قطعة",73,"72 - 75","6"],
  ["حديد تسليح 12مم","Rebar 12mm","كغم",850,"850","1"],
  ["حديد تسليح 8مم","Rebar 8mm","كغم",800,"800","1"],
  ["حديد زاوية 3×3","Equal Angles A36","متر",15000,"15,000","1"],
  ["زاوية 25×25×6000 (2.5مم)","Equal Angles A36","قطعة",22,"22","1"],
  ["زاوية 50×50×6000 (4مم)","Equal Angles A36","قطعة",60,"60","1"],
  ["شريط مسطح 10×50×6000","Flat Bars A36","قطعة",81.33,"80 - 82","3"],
  ["شفة صاج 10×200×200","HR Plates Flanges","قطعة",15,"15","8"],
  ["صاج 3مم","HR Plates","م²",25000,"25,000","1"],
  ["صاج CHQ 1.8×1220×2440","CHQ Plates A36","قطعة",160,"160","1"],
  ["صاج CHQ 3×1220×2440","CHQ Plates A36","قطعة",248.33,"245 - 250","3"],
  ["صاج CHQ 4×1220×2440","CHQ Plates A36","قطعة",328.71,"324 - 335","7"],
  ["صاج HR 1.2×1000×2000","HR Plates A36","قطعة",50,"50","1"],
  ["صاج HR 1.8×1000×2000","HR Plates A36","قطعة",82,"82","3"],
  ["صاج HR 1.8×1220×2440","HR Plates A36","قطعة",120.95,"119 - 122","3"],
  ["صاج HR 2×1000×2000","HR Plates A36","قطعة",95,"95","1"],
  ["صاج HR 3×1220×2440","HR Plates A36","قطعة",196,"196","1"],
  ["مجرى UPE 100×6000","UPE-Channel S275JR","قطعة",167,"160 - 170","4"],
  ["مجرى UPE 140×6000","UPE-Channel S275JR","قطعة",250,"250","1"],
  ["مجرى UPN 100×50×6000","UPN-Channel S275JR","قطعة",210,"200 - 220","2"],
  ["مجرى UPN 100×6000","UPN-Channel S275JR","قطعة",220,"220","2"],
  ["مجرى UPN 120×6000","UPN-Channel S275JR","قطعة",254,"250 - 260","5"],
  ["مجرى UPN 140×6000","UPN-Channel S275JR","قطعة",317,"317","3"],
  ["مجرى UPN 40×20×6000","UPN-Channel S275JR","قطعة",78.63,"75 - 80","4"],
  ["مجرى UPN 80×6000","UPN-Channel S275JR","قطعة",170,"160 - 180","6"],
  ["مواسير تجارية 2×4×6000","Commercial Pipes","قطعة",113,"113","1"],
];

// ===== STATE =====
let savedNotes = {};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function formatPrice(n) {
  return n % 1 === 0 ? n.toLocaleString() : n.toFixed(2);
}

function render() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map((p, i) => {
    const key = p[0];
    const note = savedNotes[key] || '';
    const savedClass = note ? 'saved' : '';
    return `
    <div class="product-card" data-name="${key}" data-unit="${p[2]}">
      <div class="product-name">${key}</div>
      <div class="product-desc">${p[1]}</div>
      <div class="product-unit">${p[2]}</div>
      <div class="product-details">
        <div class="product-avg">${formatPrice(p[3])} ر.س</div>
        <div>
          <div class="product-count"><strong>${p[5]}</strong> مصدر</div>
          <div class="price-range">${p[4]} ر.س</div>
        </div>
      </div>
      <div class="note-wrap">
        <label>ملاحظة (التسمية الشائعة في الورشة)</label>
        <input class="note-input ${savedClass}" type="text" placeholder="..." value="${note}" data-key="${key}">
      </div>
    </div>`;
  }).join('');

  // Stats
  const total = products.reduce((s, p) => s + p[3], 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${products.length}</div><div class="label">إجمالي المنتجات</div></div>
    <div class="stat-card"><div class="num">${products.reduce((s, p) => s + parseInt(p[5]), 0)}</div><div class="label">قيمة سعرية</div></div>
    <div class="stat-card"><div class="num">${new Set(products.map(p => p[2])).size}</div><div class="label">وحدات قياس</div></div>
    <div class="stat-card"><div class="num">${formatPrice(total)}</div><div class="label">مجموع متوسط الأسعار</div></div>`;

  // Attach note save handlers
  document.querySelectorAll('.note-input').forEach(inp => {
    inp.addEventListener('change', function() {
      const key = this.dataset.key;
      const val = this.value.trim();
      // Save to Firebase (triggers onValue which updates all clients)
      notesRef.child(key.replace(/[.#$\/\[\]]/g, '_')).set(val || null);
    });
  });
}

function filterProducts() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const unit = document.getElementById('unitFilter').value;
  const cards = document.querySelectorAll('.product-card');
  let visible = 0;
  cards.forEach(c => {
    const name = c.getAttribute('data-name').toLowerCase();
    const unitVal = c.getAttribute('data-unit');
    const matchSearch = !search || name.includes(search);
    const matchUnit = !unit || unitVal === unit;
    c.style.display = matchSearch && matchUnit ? '' : 'none';
    if (matchSearch && matchUnit) visible++;
  });
  document.getElementById('emptyState').style.display = visible === 0 ? '' : 'none';
}

// ===== FIREBASE REAL-TIME SYNC =====
// Listen for changes from any client
notesRef.on('value', (snapshot) => {
  const data = snapshot.val() || {};
  // Convert Firebase keys back (remove underscore encoding)
  savedNotes = {};
  // Build reverse lookup: map sanitized key -> original product name
  const sanitizedToOriginal = {};
  products.forEach(p => {
    const sk = p[0].replace(/[.#$\/\[\]]/g, '_');
    sanitizedToOriginal[sk] = p[0];
  });
  for (const [sk, val] of Object.entries(data)) {
    const original = sanitizedToOriginal[sk];
    if (original && val) savedNotes[original] = val;
  }
  render();
  showToast('↻ تم تحديث الملاحظات');
}, (error) => {
  console.error('Firebase error:', error);
  showToast('⚠️ خطأ في الاتصال بقاعدة البيانات');
});

render();
</script>
</body>
</html>
