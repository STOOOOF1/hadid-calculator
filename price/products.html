<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>قائمة المنتجات</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,sans-serif;background:#f0f4fa;color:#222;padding:10px;line-height:1.5}
.c{max-width:1100px;margin:0 auto}
.h{background:#1e3a5f;color:#fff;padding:16px;border-radius:10px;text-align:center;margin-bottom:12px;position:relative}
.h h1{font-size:1.2rem}
.h p{font-size:.78rem;opacity:.7}
.st{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;font-size:.65rem;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.12);cursor:pointer}
.st .q{width:7px;height:7px;border-radius:50%;display:inline-block}
.st .q.g{background:#34d399}
.st .q.r{background:#ef4444}
.st .q.y{background:#f59e0b}
.s{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sd{background:#fff;border-radius:8px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sd .n{font-size:1.1rem;font-weight:700;color:#1e3a5f}
.sd .l{font-size:.65rem;color:#888;margin-top:2px}
.f{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.f input{flex:1;min-width:120px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:.82rem;font-family:inherit}
.f input:focus{outline:none;border-color:#1e3a5f}
.f select{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:.8rem;font-family:inherit;background:#fff}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.pc{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.pc .t{font-size:.85rem;font-weight:700;color:#1e3a5f}
.pc .d{font-size:.72rem;color:#777;direction:ltr;text-align:left;margin:2px 0 4px}
.pc .u{display:inline-block;background:#eef4fb;color:#1e3a5f;padding:1px 8px;border-radius:999px;font-size:.66rem;font-weight:600;margin-bottom:6px}
.pc .r{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.pc .a{font-size:1rem;font-weight:800;color:#1e3a5f}
.pc .x{font-size:.66rem;color:#999}
.pc .x s{color:#555}
.pc .nw{margin-top:6px;padding-top:6px;border-top:1px dashed #ddd;display:flex;gap:4px;align-items:center}
.pc .nw input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:.74rem;font-family:inherit;background:#fafbfc;min-width:0}
.pc .nw input:focus{border-color:#1e3a5f;background:#fff}
.pc .nw input.s{border-color:#0a8;background:#ebfff5}
.e{text-align:center;padding:40px;color:#999;font-size:.85rem}
.ft{text-align:center;padding:16px 0;font-size:.68rem;color:#999}
@media(max-width:500px){
  .s{grid-template-columns:repeat(2,1fr)}
  .g{grid-template-columns:1fr}
  .h h1{font-size:1rem}
}
</style>
</head>
<body>
<div class="c">

<div class="h">
  <h1>قائمة المنتجات ومتوسط الأسعار</h1>
  <p>شركة النفيعي للحديد</p>
  <div class="st" id="st" onclick="conn()">
    <span class="q y" id="q"></span>
    <span id="sl">...</span>
  </div>
</div>

<div class="s" id="s"></div>

<div class="f">
  <input id="q" placeholder="بحث..." oninput="fl()">
  <select id="uf" onchange="fl()">
    <option value="">الكل</option>
    <option>قطعة</option><option>كغم</option><option>م²</option><option>متر</option>
  </select>
</div>

<div class="g" id="g"></div>
<div class="e" id="e" style="display:none">لا توجد نتائج</div>
<div class="ft">منتجات ورشة الهياكل المعدنية</div>
</div>

<script>
const P=[
  ["HEB عارضة 140×6000","HEB-S275JR Beams","قطعة",666,"657-685","6"],
  ["IPE عارضة 400×12000","IPE-S275JR Beams","قطعة",2550,"2,550","1"],
  ["IPEAA عارضة 200×12000","IPEAA-Beams","قطعة",660,"660","1"],
  ["IPEAA وطني عارضة 100×6000","IPEAA-WATANI Beams","قطعة",115,"115","2"],
  ["Round Bar 12مم×6000","Round Bar A36","قطعة",20,"20","1"],
  ["Round Bar 18مم×6000","Hot Rolled CS Round Bars","قطعة",71.65,"72","1"],
  ["أنبوب مربع 100×100×6000","Square Tube A36","قطعة",634,"634","3"],
  ["أنبوب مربع 30×30×6000 (2مم)","Square Tube A36","قطعة",37,"36-38","6"],
  ["أنبوب مربع 40×40×6000 (2مم)","Square Tube A36","قطعة",48.5,"48-50","3"],
  ["أنبوب مربع 40×40×6000 (3مم)","Square Tube A36","قطعة",72.5,"72-73","4"],
  ["أنبوب مربع 40×40×6000 (4مم)","Square Tube A36","قطعة",102,"102","3"],
  ["أنبوب مربع 80×80×6000 (6مم)","Square Tube A36","قطعة",335.71,"330-340","7"],
  ["أنبوب مستطيل 100×50×6000 (2مم)","Rectangular Tube A36","قطعة",94.64,"94-95","3"],
  ["أنبوب مستطيل 100×50×6000 (4مم)","Rectangular Tube A36","قطعة",180,"180","7"],
  ["أنبوب مستطيل 40×20×6000","Rectangular Tube A36","قطعة",38,"38","1"],
  ["أنبوب مستطيل 80×40×6000","Rectangular Tube A36","قطعة",73,"72-75","6"],
  ["حديد تسليح 12مم","Rebar 12mm","كغم",850,"850","1"],
  ["حديد تسليح 8مم","Rebar 8mm","كغم",800,"800","1"],
  ["حديد زاوية 3×3","Equal Angles A36","متر",15000,"15,000","1"],
  ["زاوية 25×25×6000 (2.5مم)","Equal Angles A36","قطعة",22,"22","1"],
  ["زاوية 50×50×6000 (4مم)","Equal Angles A36","قطعة",60,"60","1"],
  ["شريط مسطح 10×50×6000","Flat Bars A36","قطعة",81.33,"80-82","3"],
  ["شفة صاج 10×200×200","HR Plates Flanges","قطعة",15,"15","8"],
  ["صاج 3مم","HR Plates","م²",25000,"25,000","1"],
  ["صاج CHQ 1.8×1220×2440","CHQ Plates A36","قطعة",160,"160","1"],
  ["صاج CHQ 3×1220×2440","CHQ Plates A36","قطعة",248.33,"245-250","3"],
  ["صاج CHQ 4×1220×2440","CHQ Plates A36","قطعة",328.71,"324-335","7"],
  ["صاج HR 1.2×1000×2000","HR Plates A36","قطعة",50,"50","1"],
  ["صاج HR 1.8×1000×2000","HR Plates A36","قطعة",82,"82","3"],
  ["صاج HR 1.8×1220×2440","HR Plates A36","قطعة",120.95,"119-122","3"],
  ["صاج HR 2×1000×2000","HR Plates A36","قطعة",95,"95","1"],
  ["صاج HR 3×1220×2440","HR Plates A36","قطعة",196,"196","1"],
  ["مجرى UPE 100×6000","UPE-Channel S275JR","قطعة",167,"160-170","4"],
  ["مجرى UPE 140×6000","UPE-Channel S275JR","قطعة",250,"250","1"],
  ["مجرى UPN 100×50×6000","UPN-Channel S275JR","قطعة",210,"200-220","2"],
  ["مجرى UPN 100×6000","UPN-Channel S275JR","قطعة",220,"220","2"],
  ["مجرى UPN 120×6000","UPN-Channel S275JR","قطعة",254,"250-260","5"],
  ["مجرى UPN 140×6000","UPN-Channel S275JR","قطعة",317,"317","3"],
  ["مجرى UPN 40×20×6000","UPN-Channel S275JR","قطعة",78.63,"75-80","4"],
  ["مجرى UPN 80×6000","UPN-Channel S275JR","قطعة",170,"160-180","6"],
  ["مواسير تجارية 2×4×6000","Commercial Pipes","قطعة",113,"113","1"],
];

let N={};
try{let d=localStorage.getItem('n');if(d)N=JSON.parse(d)}catch(e){}

const API='https://jsonblob.com/api/jsonBlob';
let bid=localStorage.getItem('bid');
let online=false;

function sts(c,t){
  document.getElementById('q').className='q '+c;
  document.getElementById('sl').textContent=t;
  online=c==='g';
}

function conn(){
  sts('y','جاري...');
  if(bid){
    fetch(API+'/'+bid).then(r=>{
      if(r.status===404){bid=null;localStorage.removeItem('bid');conn();return null}
      return r.json();
    }).then(d=>{
      if(d){
        let ch=false;
        for(const[k,v]of Object.entries(d)){if(!N[k]){N[k]=v;ch=true}}
        for(const[k,v]of Object.entries(N)){if(d[k]!==v){d[k]=v;ch=true}}
        if(ch){saveCloud();local();R()}
        sts('g','متزامن');
      }
    }).catch(()=>sts('r','اضغط للتوصيل'));
  }else{
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(N)})
    .then(r=>{
      bid=(r.headers.get('Location')||'').split('/').pop();
      if(bid){localStorage.setItem('bid',bid);sts('g','متزامن')}
    }).catch(()=>sts('r','اضغط للتوصيل'));
  }
}

function saveCloud(){
  if(!bid||!online)return;
  fetch(API+'/'+bid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(N)}).catch(()=>{});
}

function local(){try{localStorage.setItem('n',JSON.stringify(N))}catch(e){}}

function fp(n){return n%1===0?n.toLocaleString():n.toFixed(2)}

function R(){
  const g=document.getElementById('g');
  g.innerHTML=P.map(p=>{
    const k=p[0],v=N[k]||'',c=v?'s':'';
    return `<div class="pc" data-n="${k}" data-u="${p[2]}">
      <div class="t">${k}</div>
      <div class="d">${p[1]}</div>
      <div class="u">${p[2]}</div>
      <div class="r"><div class="a">${fp(p[3])} ر.س</div><div class="x"><s>${p[5]}</s> مصدر<br>${p[4]} ر.س</div></div>
      <div class="nw"><input class="${c}" placeholder="التسمية في الورشة..." value="${v}" data-k="${k}"></div>
    </div>`;
  }).join('');

  document.getElementById('s').innerHTML=`
    <div class="sd"><div class="n">${P.length}</div><div class="l">منتج</div></div>
    <div class="sd"><div class="n">${P.reduce((s,p)=>s+ +p[5],0)}</div><div class="l">سعر</div></div>
    <div class="sd"><div class="n">${new Set(P.map(p=>p[2])).size}</div><div class="l">وحدة</div></div>
    <div class="sd"><div class="n">${fp(P.reduce((s,p)=>s+p[3],0))}</div><div class="l">إجمالي</div></div>`;

  document.querySelectorAll('.nw input').forEach(i=>{
    i.addEventListener('change',function(){
      const k=this.dataset.k,v=this.value.trim();
      if(v)N[k]=v;else delete N[k];
      local();saveCloud();
      this.classList.toggle('s',!!v);
    });
  });
}

function fl(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const u=document.getElementById('uf').value;
  const c=document.querySelectorAll('.pc');
  let v=0;
  c.forEach(x=>{
    const m=!q||x.dataset.n.toLowerCase().includes(q);
    const mu=!u||x.dataset.u===u;
    x.style.display=m&&mu?'':'none';
    if(m&&mu)v++;
  });
  document.getElementById('e').style.display=v===0?'':'none';
}

function poll(){
  if(!bid||!online)return;
  fetch(API+'/'+bid).then(r=>r.ok?r.json():null).then(d=>{
    if(d){
      let ch=false;
      for(const[k,v]of Object.entries(d)){
        if(N[k]!==v){N[k]=v;ch=true}
      }
      if(ch){local();R()}
    }
  }).catch(()=>{});
}

R();
conn();
setInterval(poll,8000);
</script>
</body>
</html>
